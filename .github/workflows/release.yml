name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Test before release ─────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt found issues:"
            gofmt -l .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ── Build binaries ──────────────────────────────────────────────────────────
  release-binaries:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X github.com/banschikovde/fluxview/internal/cli.version=${VERSION}"

          for OS in linux darwin; do
            for ARCH in amd64 arm64; do
              echo "Building ${OS}/${ARCH}..."
              CGO_ENABLED=0 GOOS=${OS} GOARCH=${ARCH} go build \
                -ldflags="${LDFLAGS}" \
                -o fluxview-${OS}-${ARCH} \
                ./cmd/fluxview/
              tar czf fluxview-${OS}-${ARCH}.tar.gz fluxview-${OS}-${ARCH}
            done
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            fluxview-linux-amd64.tar.gz
            fluxview-linux-arm64.tar.gz
            fluxview-darwin-amd64.tar.gz
            fluxview-darwin-arm64.tar.gz

  # ── Build and push Docker image ─────────────────────────────────────────────
  release-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/fluxview" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}
            ${{ steps.vars.outputs.image }}:latest
